version: "3.9"

services:
  # ── Python FastAPI backend ────────────────────────────────────────────────
  backend:
    build: ./backend
    environment:
      ADMIN_TOKEN:    ${ADMIN_TOKEN:-changeme123}
      DATABASE_URL:   sqlite:////data/portfolio.db
      CORS_ORIGINS:   '["http://localhost","http://localhost:3000"]'
    volumes:
      - db_data:/data          # SQLite persists across restarts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── React + nginx frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""       # empty = nginx proxy handles /api/ internally
    ports:
      - "3000:80"              # Visit http://localhost:3000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
