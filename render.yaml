### Render Blueprint — deploys both services from one GitHub repo
### Deploy at: https://dashboard.render.com/blueprints

services:
  # ── Backend API (Python FastAPI) ──────────────────────────────────────────
  - type: web
    name: portfolio-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: ADMIN_TOKEN
        generateValue: true        # Render auto-generates a secure token
      - key: DATABASE_URL
        value: sqlite:///./portfolio.db
      - key: CORS_ORIGINS
        value: '["*"]'             # Restrict to your Vercel URL after deploy

  # ── Frontend (Static Site) ────────────────────────────────────────────────
  - type: static
    name: portfolio-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: ""                  # Set this to your portfolio-api URL after first deploy
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
